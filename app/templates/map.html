{% extends "base.html" %}

{% block content %}
    <section class="page-section">
        <h1>Places I've Been</h1>

        <!-- The box the interactive map renders into -->
        <div id="map"></div>
    </section>

    <!-- Leaflet's stylesheet and library, loaded from a CDN -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Hand the Python PLACES list to JavaScript as JSON.
        const places = {{ places | tojson }};

        // Create the map. maxBounds + viscosity lock it to a single world copy
        // so it can't be dragged endlessly sideways; minZoom stops zooming out
        // far enough to reveal repeated globes.
        const map = L.map("map", {
            minZoom: 2,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0,
            worldCopyJump: false,
        }).setView([30, -40], 2);

        // Add the actual map imagery (free OpenStreetMap tiles).
        // noWrap: true stops the tiles from repeating horizontally.
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors",
            noWrap: true,
        }).addTo(map);

        // Drop a pin for each place; build a popup with its name + note.
        places.forEach(function (place) {
            const popup = place.note
                ? "<strong>" + place.name + "</strong><br>" + place.note
                : "<strong>" + place.name + "</strong>";
            L.marker([place.lat, place.lng]).addTo(map).bindPopup(popup);
        });
    </script>
{% endblock %}
